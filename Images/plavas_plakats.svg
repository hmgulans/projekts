<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1300" viewBox="0 0 900 1300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e5f37"/>
      <stop offset="100%" stop-color="#dff3c7"/>
    </linearGradient>
  </defs>
  <rect width="900" height="1300" fill="url(#bg)"/>
  <rect x="45" y="45" width="810" height="1210" rx="28" fill="rgba(255,255,255,0.82)" stroke="#184d2f" stroke-width="6"/>
  <text x="450" y="145" font-size="64" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#184d2f">PĻAVAS</text>
  <text x="450" y="200" font-size="28" text-anchor="middle" font-family="Arial" fill="#28593a">Bioloģiski vērtīgs un aizsargājams biotops</text>
  <rect x="95" y="255" width="710" height="180" rx="18" fill="#eef8e8"/>
  <text x="120" y="310" font-size="30" font-family="Arial" font-weight="bold" fill="#184d2f">Kas ir pļava?</text>
  <text x="120" y="355" font-size="25" font-family="Arial" fill="#234" >Pļava ir zālāju ekosistēma, kuru veido</text>
  <text x="120" y="390" font-size="25" font-family="Arial" fill="#234" >daudzgadīgi lakstaugi. Latvijā tā parasti</text>
  <text x="120" y="425" font-size="25" font-family="Arial" fill="#234" >saglabājas tikai tad, ja pļavu pļauj vai gana.</text>
  <rect x="95" y="470" width="340" height="250" rx="18" fill="#d9efcf"/>
  <rect x="465" y="470" width="340" height="250" rx="18" fill="#d9efcf"/>
  <text x="265" y="525" font-size="30" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#184d2f">Kāpēc svarīga?</text>
  <text x="120" y="575" font-size="24" font-family="Arial" fill="#234">• Tajā mīt ļoti daudz augu un</text>
  <text x="120" y="610" font-size="24" font-family="Arial" fill="#234">  kukaiņu sugu.</text>
  <text x="120" y="645" font-size="24" font-family="Arial" fill="#234">• Tā ir nozīmīga putniem, arī</text>
  <text x="120" y="680" font-size="24" font-family="Arial" fill="#234">  griezei.</text>
  <text x="635" y="525" font-size="30" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#184d2f">Kas apdraud?</text>
  <text x="490" y="575" font-size="24" font-family="Arial" fill="#234">• Pļavu neapsaimniekošana</text>
  <text x="490" y="610" font-size="24" font-family="Arial" fill="#234">• Aizaugšana ar krūmiem</text>
  <text x="490" y="645" font-size="24" font-family="Arial" fill="#234">• Aršana un mēslošana</text>
  <text x="490" y="680" font-size="24" font-family="Arial" fill="#234">• Sugu daudzveidības samazināšanās</text>
  <rect x="95" y="755" width="710" height="180" rx="18" fill="#eef8e8"/>
  <text x="120" y="810" font-size="30" font-family="Arial" font-weight="bold" fill="#184d2f">Interesants fakts</text>
  <text x="120" y="860" font-size="25" font-family="Arial" fill="#234">Neielabotas pļavas Latvijā aizņem tikai</text>
  <text x="120" y="895" font-size="25" font-family="Arial" fill="#234">aptuveni 1% no teritorijas, tomēr tajās</text>
  <text x="120" y="930" font-size="25" font-family="Arial" fill="#234">var sastapt ap 400 dažādu augu sugu.</text>
  <rect x="95" y="975" width="710" height="180" rx="18" fill="#d9efcf"/>
  <text x="450" y="1035" font-size="34" text-anchor="middle" font-family="Arial" font-weight="bold" fill="#184d2f">Secinājums</text>
  <text x="450" y="1085" font-size="25" text-anchor="middle" font-family="Arial" fill="#234">Pļavas nav tikai skaista ainava.</text>
  <text x="450" y="1120" font-size="25" text-anchor="middle" font-family="Arial" fill="#234">Tās ir jākopj, lai saglabātu Latvijas</text>
  <text x="450" y="1155" font-size="25" text-anchor="middle" font-family="Arial" fill="#234">dabas daudzveidību arī nākotnē.</text>
</svg>
